spring:
  application:
    name: task-tracker-backend
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/task_tracker_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.LongSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      compression-type: lz4
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 10
        batch.size: 32768
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        retry.backoff.ms: 500
        spring.json:
          add.type.headers: true
          type.mapping: >
            MessageDto:com.walking.backend.domain.dto.kafka.MessageDto,
            UserActivityEvent:com.walking.backend.domain.event.UserActivityEvent
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access_token_expiration: 15
      refresh_token_expiration: 7200
      redis:
        refresh_token_prefix: 'token:'
        user_token_prefix: 'user:'
      cookie-name: refresh_token
  label:
    max-per-board: 100
    max-per-task: 15
  task:
    position-step: 10.0
  kafka:
    topics:
      email-sending: email_sending_tasks
      user-activity: user_activities
    partitions: 1
    replicas: 1
  minio:
    endpoint: http://localhost:9000
    access-key: minioAdmin
    secret-key: minioAdmin
    bucket-avatar: avatars
    bucket-attachment: attachments
    batch-delete-size: 1000
    attachment:
      presigned-url-expiration: 15
      max-per-task: 10
      allowed-content-types:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
        - application/pdf
        - application/zip
        - application/x-zip-compressed
        - text/plain
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet